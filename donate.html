<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поддержка автора — QUTTY</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="QUTTY">
    <h1>QUTTY</h1>
  </div>

  <div class="nav">
    <a href="index.html">Главная</a>
    <a href="support.html">Поддержка</a>
    <a href="donate.html">Поддержка автора</a>
  </div>
</header>

<section class="donate-page">
  <div class="donate-box">

    <h2>Поддержка автора QUTTY</h2>

    <p class="donate-text">
      Все средства пойдут на разработку мессенджера QUTTY,
      развитие проекта, дизайн, хостинг и новые функции.
    </p>

    <!-- QR КОД -->
    <div class="qr-box">
      <img src="images/qr.png" alt="QR код для доната">
      <p>Отсканируйте QR-код для перевода</p>
    </div>

    <!-- КАРТА -->
    <div class="donate-card">
      <div class="label">Номер карты</div>
      <div class="number">2202 2082 0192 1617</div>
      <div class="owner">Сбербанк — Владислав М.</div>
    </div>

    <button class="copy-btn" onclick="copyCard()">Скопировать номер</button>

    <p id="copyText" class="copy-text"></p>

  </div>
</section>

<script>
function copyCard() {
  navigator.clipboard.writeText("2202208201921617");
  document.getElementById("copyText").textContent = "Скопировано ✔";
}
</script>

<script src="script.js"></script>
</body>
</html>
